# Cloud Run deployment configuration
# Loaded by node-config when NODE_APP_INSTANCE=cloudrun (set by deploy.sh).
# NODE_ENV is set to 'production' by deploy.sh.
#
# Secrets: SESSION_PASSWORD is injected from Google Secret Manager.
# app.url.hostname: injected via NODE_CONFIG env var by deploy.sh after the
#   service URL is known. No manual editing required.

app:
  url:
    protocol: https
    hostname: ''   # Overridden at runtime via NODE_CONFIG — see deploy.sh
    port:
  hostname: 0.0.0.0
  plugins:
    session:
      cookieOptions:
        password: ''   # Injected via SESSION_PASSWORD env var from Secret Manager
        domain: ''
        isSecure: true
        isSameSite: 'None'

db:
  backend: firestore   # No MongoDB required
  redis:
    enabled: false
  # db.firestore.projectId is not set here; the Firestore SDK reads
  # GOOGLE_CLOUD_PROJECT automatically on Cloud Run.
