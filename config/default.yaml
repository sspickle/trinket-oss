      - '//cdnjs.cloudflare.com/ajax/libs/angular-foundation/0.8.0/mm-foundation-tpls.min.js'
      - '/partials/directives/trinket-calendar.js'
      - '/components/angular-notifyjs.js'
      - '//cdnjs.cloudflare.com/ajax/libs/jsdiff/1.0.8/diff.min.js'
      - '//cdnjs.cloudflare.com/ajax/libs/angular-ui-ace/0.2.3/ui-ace.min.js'
      - '/js/services/config.js'
