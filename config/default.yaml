      - '/js/library/trinkets/list/list-controller.js'
      - '/js/library/trinkets/list/folder-list-controller.js'
      - '/js/library/trinkets/copy/copy-controller.js'
      - '/js/library/components/trinkets/trinket.js'
      - '/js/library/components/trinkets/trinket-directive.js'
      - '/js/library/components/trinkets/trinket-service.js'
