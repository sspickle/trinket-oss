  extensionWhitelist:
    ipynb: 'text/plain'
  autorun:
    - python
    - glowscript
    - blocks
    - python3
    - java
    - glowscript-blocks
    - R
  outputOnly:
    - python
    - html
    - glowscript
    - blocks
    - python3
    - pygame
    - java
    - glowscript-blocks
    - R
  toggleCode:
    - python
    - html
    - glowscript
    - blocks
    - python3
    - pygame
    - java
    - glowscript-blocks
    - R
  toggleEditor:
    - pygame
  downloadable:
    - python
    - html
    - python3
    - pygame
    - java
    - blocks
    - glowscript-blocks
    - R
    - pygame
  uploadable:
    - blocks
    - glowscript-blocks
  configurable:
    - python
    - pygame
    - python3
    - R
    - glowscript
    - html
    - java
  nodraft:
    - console
  notShareable:
    - pygame
  hideGeneratedCode:
    - blocks
    - glowscript-blocks
  runOption:
    python:
      - run
      - console
    python3:
      - run
      - console
    R:
      - run
      - console
  glowscript:
    defaultVersion: '3.2'
    blocksVersion: '2.7'
  embed:
    proxy: 'http://127.0.0.1/proxy'
    skulpt:
      local: false # when true pulls from bower install instead of cdn
      min: false # when true uses minified local copy of skulpt core
    common:
      skulpt_js:
        - '/js/skulpt/signal.js'
        - '/js/skulpt/wrapper.js'
    logClientCodeError: true
    logClientMetric: true
    draftDebounce: 1000
    autosaveDebounce: 1000
    enableLogin: true
    enableCopyRemix: true
  auth:
    google:
      clientSecret:
      clientID:
      callbackURL:
  serverside:
    # Maps trinket lang param to config key
    langmap:
      python3: python3
      R: r3
      java: java8
      pygame: pygame
    # All server-side types go through nginx reverse proxy on port 8080
    # Python 3
    python3:
      api:
        default: 'http://localhost:8080/python3'
    # Java
    java8:
      api:
        default: 'http://localhost:8080/java'
    # R
    r3:
      api:
        default: 'http://localhost:8080/r'
    # Pygame
    pygame:
      api:
        default: 'http://localhost:8080/pygame'
  xframeDeny:
    - '/'
    - '/login'
    - '/signup'
    - '/contact'
    - '/educators'
workers:
  trinkets:
    outputDir: '/tmp/' # should be readable by nginx
    templateUrl: 'http://127.0.0.1/tmp/' # should be an nginx alias pointing to outputDir
db:
  backend: firestore
  mongo:
    host: localhost
    port: 27017
    database: trinket
    user:
    pass:
  mongoread:
    host:
    port: 27017
    database: trinket
    user:
    pass:
    opts: 'connectTimeoutMS=300000&socketTimeoutMS=300000'
  redis:
    app:
      host: localhost
      port: 6379
      pass:
    exports:
      host: localhost
      port: 6379
    bullqueues:
      - exports
    sandbox:
      host: localhost
      port: 6379
gcs:
  buckets:
    snapshots:
      name: 'trinket-snapshots'
      host: 'https://storage.googleapis.com/trinket-snapshots'

aws:
  key: ''
  keyId: ''
  region: us-east-1
  buckets:
    userassets:
      name: your-user-assets-bucket
      host: 'https://your-assets-bucket.example.com'
      thumbnail: 'thumb-%{s}'
      thumbnailHost: 'https://your-thumbnails-bucket.example.com'
      thumbnailBucket: your-thumbnails-bucket
    snapshots:
      name: your-snapshots-bucket
      host: 'https://your-snapshots-bucket.example.com'
    cdn:
      name: your-cdn-bucket
      host: 'https://your-cdn-bucket.example.com'
    materials:
      name: your-materials-bucket
      host: 'https://your-materials-bucket.example.com'
    useravatars:
      name: your-avatars-bucket
      host: 'https://your-avatars-bucket.example.com'
    appassets:
      name: your-app-assets-bucket
      host: 'https://your-app-assets.example.com'
    vendorassets:
      name: your-vendor-assets-bucket
      host: 'https://your-cdn.example.com'
  lambda:
    createThumbnail:
      secret: ''
  mail:
    keyId: ''
    key: ''
sandbox:
  # Mode: 'local' uses sandboxed srcdoc (simpler, no external service needed)
  #       'external' uses separate sandbox server (more secure, requires setup)
  mode: 'local'
  # Local mode settings (used when mode: 'local')
  local:
    # Sandbox permissions - do NOT add 'allow-same-origin' for security
    permissions: 'allow-scripts allow-forms allow-modals allow-popups'
  # External mode settings (used when mode: 'external')
  hostname: 0.0.0.0
  port: 3030
  cors:
    origin: # array of hosts to allow cross-domain requests
      - 'http://trinket.dev'
  expiration: 300 # 5 minutes
  contentSecurityPolicy: "default-src *; img-src * data:; style-src * 'unsafe-inline'; script-src * 'unsafe-inline' 'unsafe-eval'"
  url:
    protocol: http
    domain: .trinket.dev
    serverSubdomain: sandbox
    port:
