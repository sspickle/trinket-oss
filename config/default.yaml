features:
  courses: true   # Enable/disable courses feature entirely
  assets: false   # Enable/disable asset uploads (requires S3 or compatible storage)
  accessibilityToggle: false  # Show accessibility toggle in embed toolbar (for screen reader mode)
  trinkets:
    # Client-side languages - work out of the box
    python: false      # Skulpt-based Python 2/3
    html: false        # HTML/CSS/JS
    blocks: false      # Block-based coding
    glowscript: true   # 3D graphics with GlowScript/VPython (WebVPython)
    glowscript-blocks: false
    console: false     # Python console/REPL
    music: false       # EarSketch music coding
    # Server-side languages - require additional backend services
    python3: false     # Requires Python 3 backend
    java: false        # Requires Java backend
    pygame: false      # Requires Pygame backend
    R: false           # Requires R backend

auth:
  # Emails that bypass the instructor/roster check and have full admin access
  adminEmails: []
  firebase:
    projectId: ''   # Your GCP/Firebase project ID — override in local.yaml
    clientConfig:   # Firebase web SDK config from Project Settings > Your apps
      apiKey: ''
      authDomain: ''
      projectId: ''
      storageBucket: ''
      messagingSenderId: ''
      appId: ''

app:
  siteName: 'Trinket'
  siteUrl: ''
  supportEmail: ''
  adminEmail: ''
  logo: '/img/trinket-logo.png'
  logoIcon: '/img/trinket-logo-circles.png'
  hostname: 0.0.0.0
  port: 3000
  url:
    protocol: https
    hostname: trinket.dev
    port:
  start: true
  usersubdomains: false
  templates: lib/views/
  staticPages: static
  plugins:
    session:
      cookieOptions:
        password: '' # cookie secret - set in local.yaml
        isSecure: false # required for non-https applications
        domain: .trinket.dev
      maxCookieSize: 0 # ensures sessions are stored server-side
      name: session # same as default but adding for cookie updates
      cache:
        cache: 'sessions'
        expiresIn: 2147483647 # 32-bit restrictions and/or fixed with catbox upgrade
    travelogue:
      urls:
        failureRedirect: '/login'
        successRedirect: '/welcome'
        excludePaths:
          - js
          - css
          - fonts
          - img
          - partials
  assets:
    jshead:
      - '//cdnjs.cloudflare.com/ajax/libs/modernizr/2.8.3/modernizr.min.js'
      - '/components/dist/lodash.min.js'
      - '//cdnjs.cloudflare.com/ajax/libs/jquery/2.2.4/jquery.min.js'
      - '//cdnjs.cloudflare.com/ajax/libs/angular.js/1.3.20/angular.min.js'
      - '/js/trinket.js'
      - '/js/trinket-config.js'
      - '/js/trinket-roles.js'
      - '/js/util/template.js'
    jsbody:
      - '//cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.js'
      - '//ajax.googleapis.com/ajax/libs/angularjs/1.3.20/angular-route.min.js'
      - '//cdnjs.cloudflare.com/ajax/libs/restangular/1.3.1/restangular.min.js'
      - '/components/marked/lib/marked.js'
      - '//cdnjs.cloudflare.com/ajax/libs/highlight.js/8.0/highlight.min.js'
      - '/components/src-min-noconflict/ace.js'
      - '/components/foundation/js/foundation.min.js'
      - '/partials/directives/flash.js'
      - '/partials/directives/trinket.js'
      - '//cdnjs.cloudflare.com/ajax/libs/crypto-js/3.1.2/rollups/aes.js'
      - '/js/services/roles.js'
      - '/partials/directives/join-course.js'
      - '/partials/directives/courses.js'
      - '/js/util/cache.js'
      - '/js/debug.js'
      - '/js/util/ng-text-select.js'
      - '/js/util/text-select.js'
      - '/js/trinket-share.js'
      - '//cdnjs.cloudflare.com/ajax/libs/notify/0.4.2/notify.min.js'
      - '//ajax.googleapis.com/ajax/libs/angularjs/1.3.20/angular-aria.min.js'
    css:
      - '//cdnjs.cloudflare.com/ajax/libs/highlight.js/8.0/styles/github.min.css'
      - '//cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css'
      - '//cdnjs.cloudflare.com/ajax/libs/video.js/5.20.4/video-js.min.css'
      - '/css/base.css'
  components:
    'ace-builds': 'v1.2.6.1rc2'
    'anchor-js': '2.0.0'
    'angular-file-saver': '1.1.3'
    'angular-notifyjs': '0.1.0'
    'angular-ui-router': '0.2.11'
    'angular-ui-tree': '2.0.10'
    'angular-ui-utils': '0.1.1'
    'angular-xeditable': '0.1.8'
    'bluebird': '3.5.1'
    'd3': '3.4.11'
    'filereader': '107f68c3b9'
    'file-saver.js': '1.20150507.2'
    'font-mfizz': '2.0.1'
    'gsap': '1.15.0'
    'jquery-ui': 'https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1'
    'jsdiff': '1.0.8'
    'jszip': '3.1.4'
    'jszip-utils': 'dist'
    'lazysizes': '1.5.0'
    'lodash': '2.4.1'
    'modernizr': '2.7.2'
    'ng-file-upload': '1.2.6'
    'ngInfiniteScroll': '1.1.2'
    'notifyjs': '0.4.2'
    'restangular': '1.3.1'
    'speakingurl': '1.1.5'
    'video.js': '5.20.4'
    'yamljs': '0.1.5'
  recaptcha:
    sitekey: ''
    secretkey: ''
  log:
    level: info
    debug:
      filename: '/tmp/debug.txt'
      files: true
      unauth: true
      routehandlertiming: true
  mail:
    # SMTP settings for sending email (password reset, notifications, etc.)
    from: ''      # sender address, e.g. noreply@example.com
    host: ''      # SMTP host, e.g. smtp.example.com
    port: 587     # SMTP port (587 for TLS, 465 for SSL, 25 for unencrypted)
    user: ''      # SMTP username
    pass: ''      # SMTP password
    secure: false # true for port 465, false for other ports
  cachePrefix: cache-prefix-
  prefixes: # static routes
    components:
    js:
    css:
    img:
    fonts:
    partials:
    skulpt:
    models:
  ngapps:
    main:
      - '/components/ng-file-upload.min.js'
      - '//cdnjs.cloudflare.com/ajax/libs/angular-foundation/0.8.0/mm-foundation-tpls.min.js'
      - '/components/angular-notifyjs.js'
      - '//cdnjs.cloudflare.com/ajax/libs/moment.js/2.18.1/moment.min.js'
      - '//cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.5.13/moment-timezone-with-data.min.js'
      - '//cdnjs.cloudflare.com/ajax/libs/angular-moment/1.0.1/angular-moment.min.js'
