    library:
      - '//cdnjs.cloudflare.com/ajax/libs/moment.js/2.18.1/moment.min.js'
      - '//cdnjs.cloudflare.com/ajax/libs/angular-foundation/0.8.0/mm-foundation-tpls.min.js'
      - '//cdnjs.cloudflare.com/ajax/libs/angular-ui-router/0.2.11/angular-ui-router.min.js'
